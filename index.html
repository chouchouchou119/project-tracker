<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>产品项目进度提醒</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",Arial;background:#E3F2FD;color:#212121;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#BBDEFB;border-bottom:1px solid #90CAF9;flex-shrink:0}h1{font-size:18px;color:#1565C0}
#kpiSection{display:flex;gap:12px;padding:16px 24px;flex-shrink:0}
.kpi-card{flex:1;background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);text-align:center;border-left:4px solid #90CAF9}
.kpi-main{border-left-color:#1565C0;background:linear-gradient(135deg,#E3F2FD,#fff)}
.kpi-label{font-size:13px;color:#616161;margin-bottom:6px}.kpi-value{font-size:28px;font-weight:700}.kpi-sub{font-size:11px;color:#9E9E9E;margin-top:4px}
.clickable{cursor:pointer}.clickable:hover{box-shadow:0 2px 8px rgba(0,0,0,.15)}
#mainContent{display:flex;flex:1;overflow:hidden;gap:1px;background:#E0E0E0}
#leftPanel{width:60%;display:flex;flex-direction:column;background:#fff}
#rightPanel{flex:1;background:#fff;overflow-y:auto}.detail-panel{padding:20px}
.empty-state{display:flex;align-items:center;justify-content:center;height:100%;color:#9E9E9E;font-size:14px}
.search-box{padding:10px 16px;border-bottom:1px solid #E0E0E0;flex-shrink:0}
.search-box input{width:100%;padding:8px 12px;border:1px solid #E0E0E0;border-radius:20px;font-size:13px;outline:none}
#projectList{flex:1;overflow-y:auto;padding:4px 0}
.group-header{padding:8px 16px;font-size:12px;font-weight:600;color:#616161;background:#F5F5F5;position:sticky;top:0}
.group-header.red{background:#FFEBEE;color:#E53935}
.group-header.yellow{background:#FFFDE7;color:#F57F17}
.group-header.green{background:#E8F5E9;color:#43A047}
.group-header.gray{background:#F5F5F5;color:#9E9E9E}
.project-item{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid #F5F5F5;cursor:pointer;border-left:4px solid transparent;gap:10px}
.project-item:hover{background:#F5F9FF}.project-item.selected{background:#E3F2FD;border-left-color:#1565C0}
.item-info{flex:1;min-width:0}.item-name{font-size:14px;font-weight:500}.item-meta{font-size:11px;color:#616161;margin-top:2px}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.badge-red{background:#FFEBEE;color:#E53935}.badge-yellow{background:#FFFDE7;color:#F57F17}
.badge-green{background:#E8F5E9;color:#43A047}.badge-gray{background:#F5F5F5;color:#9E9E9E}
.login-box{display:flex;justify-content:center;align-items:center;height:100vh}
.login-card{background:#fff;padding:40px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);text-align:center}
.login-card h2{color:#1565C0;margin-bottom:20px}
.login-card input{padding:10px 16px;border:2px solid #E0E0E0;border-radius:8px;font-size:16px;width:200px;text-align:center;outline:none}
.login-card button{margin-top:12px;padding:10px 32px;background:#1565C0;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer}
.summary-bar{padding:8px 16px;font-size:12px;background:#F5F5F5;border-bottom:1px solid #E0E0E0}
.filter-bar{padding:6px 16px;border-bottom:1px solid #E0E0E0}
.stage-chip{padding:3px 10px;border:1px solid #90CAF9;border-radius:12px;font-size:11px;cursor:pointer;background:#fff;color:#1565C0;margin:2px;display:inline-block}
.stage-chip.active,.stage-chip:hover{background:#1565C0;color:#fff}
</style>
</head>
<body>
<div id="loginPage" class="login-box"><div class="login-card">
<h2>请输入访问密码</h2>
<input type="password" id="pw" placeholder="输入密码" autofocus><br>
<p id="err" style="color:#E53935;margin-top:8px;display:none">密码错误</p>
<button onclick="login()">确认</button>
</div></div>
<div id="mainApp" style="display:none;height:100vh;flex-direction:column">
<header id="header"><h1>产品项目进度提醒</h1></header>
<section id="kpiSection">
<div class="kpi-card kpi-main" id="kpiMain"><div class="kpi-label">按时完成率</div><div class="kpi-value">--</div><div class="kpi-sub">加载中...</div></div>
<div class="kpi-card" id="kpi0"><div class="kpi-label">送检开始</div><div class="kpi-value">--</div><div class="kpi-sub"></div></div>
<div class="kpi-card" id="kpi1"><div class="kpi-label">送检结束</div><div class="kpi-value">--</div><div class="kpi-sub"></div></div>
<div class="kpi-card" id="kpi2"><div class="kpi-label">中试开始</div><div class="kpi-value">--</div><div class="kpi-sub"></div></div>
</section>
<main id="mainContent">
<aside id="leftPanel">
<div class="search-box"><input type="text" id="searchInput" placeholder="搜索..." oninput="render()">
<div class="filter-bar" id="stageBtns">
<span class="stage-chip active" data-s="全部" onclick="setStage(this)">全部</span>
<span class="stage-chip" data-s="送检开始" onclick="setStage(this)">送检开始</span>
<span class="stage-chip" data-s="送检结束" onclick="setStage(this)">送检结束</span>
<span class="stage-chip" data-s="中试开始" onclick="setStage(this)">中试开始</span>
<span class="stage-chip" data-s="中试结束" onclick="setStage(this)">中试结束</span>
<span class="stage-chip" data-s="上市" onclick="setStage(this)">上市</span>
</div></div>
<div id="projectList"><div class="empty-state">加载中...</div></div>
</aside>
<section id="rightPanel"><div id="detailPanel" class="detail-panel"><div class="empty-state">点击左侧项目查看详情</div></div></section>
</main></div>
<script>
var all=[],kpi=null,search="",stage="",sel=null,PWD="119119";
function login(){
var v=document.getElementById("pw").value;
if(v===PWD){
document.getElementById("loginPage").style.display="none";
document.getElementById("mainApp").style.display="flex";
document.cookie="key="+PWD+";max-age=86400;path=/";
load();
}else{document.getElementById("err").style.display="block";}
}
if(document.cookie.indexOf("key="+PWD)>=0){
document.getElementById("loginPage").style.display="none";
document.getElementById("mainApp").style.display="flex";
load();
}
function setStage(el){
var btns=document.querySelectorAll(".stage-chip");
for(var i=0;i<btns.length;i++)btns[i].classList.remove("active");
el.classList.add("active");
stage=el.getAttribute("data-s");
if(stage==="全部")stage="";
render();
}
function load(){
var x=new XMLHttpRequest();
x.open("GET","产品项目管理监控表20260529.xlsx",true);
x.responseType="arraybuffer";
x.onload=function(){
if(x.status!==200){document.getElementById("projectList").innerHTML="<div class=empty-state>加载失败</div>";return;}
var wb=XLSX.read(new Uint8Array(x.response),{type:"array"});
var s1=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:""});
var s2=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[1]],{header:1,defval:""});
parseData(s1,s2);
};
x.onerror=function(){document.getElementById("projectList").innerHTML="<div class=empty-state>网络错误</div>";};
x.send();
}
function C(v){return v?String(v).replace(/\r?\n/g," ").trim():"";}
function DT(s){if(!s||s<1)return"";try{var p=XLSX.SSF.parse_date_code(s);return p.y+"-"+String(p.m).padStart(2,"0")+"-"+String(p.d).padStart(2,"0");}catch(e){return"";}}
function DB(d1,d2){if(!d1||!d2)return Infinity;var a=new Date(d1),b=new Date(d2);if(isNaN(a)||isNaN(b))return Infinity;return Math.round((b-a)/86400000);}
function CV(a){for(var r=0;r<a.length;r++)for(var c=0;c<a[r].length;c++)if(typeof a[r][c]==="number"&&a[r][c]>40000&&a[r][c]<100000){var ds=DT(a[r][c]);if(ds)a[r][c]=ds;}}
function parseData(s1,s2){
CV(s1);CV(s2);all=[];
for(var r=1;r<s1.length;r++){
var name=C(s1[r][4]);if(!name)continue;
var p={name:name,sn:C(s1[r][0]),series:C(s1[r][1]),model:C(s1[r][5]),person:C(s1[r][36]),ps:C(s1[r][32]),cs:C(s1[r][38]),nn:C(s1[r][39]||""),
dates:{"送检开始计划":s1[r][9]||"","送检结束计划":s1[r][10]||"","中试开始计划":s1[r][11]||"","中试结束计划":s1[r][12]||"","上市计划":s1[r][15]||""},
mon:{"送检开始":C(s1[r][24]),"送检结束":C(s1[r][25]),"中试开始":C(s1[r][26])}};
p.lpcb=name.toUpperCase().includes("LPCB");p.coop=(s1[r][33]===0||s1[r][33]==="0");all.push(p);
}
render();
}
var NODES=["送检开始","送检结束","中试开始"];
var NP={"送检开始":"送检开始计划","送检结束":"送检结束计划","中试开始":"中试开始计划"};
var NA={"送检开始":"送检开始实际","送检结束":"送检结束实际","中试开始":"中试开始实际"};
var STAGE_P={"送检开始":"送检开始计划","送检结束":"送检结束计划","中试开始":"中试开始计划","中试结束":"中试结束计划","上市":"上市计划"};
var STAGE_A={"送检开始":"送检开始实际","送检结束":"送检结束实际","中试开始":"中试开始实际","中试结束":"中试结束实际","上市":"上市实际"};
function calcKPI(projs,today){
if(!today){var now=new Date();today=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");}
var m=projs.filter(function(p){
if(p.ps==="完成"||p.ps==="提前完成")return false;if(p.lpcb)return false;if(p.coop)return false;
var dp=DB(today,p.dates["送检开始计划"]);return(dp>=0&&dp<=30)||!!p.dates["送检开始实际"];
});
var d=0,bd={};for(var i=0;i<NODES.length;i++)bd[NODES[i]]={delayed:0};
for(var j=0;j<m.length;j++){
var dl=false;
for(var k=0;k<NODES.length;k++){
var plan=m[j].dates[NP[NODES[k]]],actual=m[j].dates[NA[NODES[k]]];
if(actual)continue;
if(!plan){if(m[j].mon[NODES[k]]==="逾期未完成"){bd[NODES[k]].delayed++;dl=true;}continue;}
if(DB(plan,today)>0){bd[NODES[k]].delayed++;dl=true;}
}
if(dl)d++;
}
var rate=m.length>0?(1-d/m.length):0;
return{rate:Math.round(rate*10000)/100,disp:(Math.round(rate*1000)/10).toFixed(1)+"%",dc:d,tc:m.length,bd:bd};
}
function sortProjects(projs){
var today=new Date().toISOString().split("T")[0];
var planKey=STAGE_P[stage]||null;
var actualKey=STAGE_A[stage]||null;
projs.forEach(function(p){
var urgency;
if(planKey&&p.dates[planKey]){
if(actualKey&&p.dates[actualKey]){urgency={days:Infinity,label:"已完成"};}
else{var d2=DB(today,p.dates[planKey]);if(d2<0)urgency={days:d2,label:"超期"+Math.abs(d2)+"天"};else if(d2>0)urgency={days:d2,label:"还有"+d2+"天"};else urgency={days:Infinity,label:"今天"};}
}else{
var tx=p.nn;var m=tx.match(/已超期(\d+)天/);
if(m)urgency={days:-parseInt(m[1]),label:"超期"+m[1]+"天"};
else{m=tx.match(/还有(\d+)天/);if(m)urgency={days:parseInt(m[1]),label:"还有"+m[1]+"天"};else urgency={days:Infinity,label:tx.includes("已完成")?"已完成":""};}
}
p.sd=urgency.days;p.sl=urgency.label;
if(urgency.days===Infinity)p.slv="normal";
else if(urgency.days<-30)p.slv="red";else if(urgency.days<0)p.slv="red";
else if(urgency.days<=7)p.slv="yellow";else if(urgency.days<=30)p.slv="yellow";
else p.slv="green";
if(p.ps==="完成"||p.ps==="提前完成"){p.sd=Infinity;p.sl=p.ps;p.slv="gray";}
});
projs.sort(function(a,b){return a.sd-b.sd||a.name.localeCompare(b.name,"zh-CN");});
}
function render(){
sortProjects(all);kpi=calcKPI(all);
var f=all.slice();
if(search){var kw=search.toLowerCase();f=f.filter(function(p){return p.name.toLowerCase().includes(kw)||p.series.toLowerCase().includes(kw)||p.person.toLowerCase().includes(kw);});}
if(stage)f=f.filter(function(p){return(p.cs&&p.cs.includes(stage))||(stage==="上市"&&p.dates["上市计划"]);});
document.getElementById("kpiMain").querySelector(".kpi-value").textContent=kpi.disp;
document.getElementById("kpiMain").querySelector(".kpi-sub").textContent="延期 "+kpi.dc+" / 监控 "+kpi.tc;
for(var i=0;i<3;i++){
var c=document.getElementById("kpi"+i),bd=kpi.bd[NODES[i]];
c.querySelector(".kpi-value").textContent=bd.delayed>0?bd.delayed+" 逾期":"正常";
c.querySelector(".kpi-value").style.color=bd.delayed>0?"#E53935":"#43A047";
c.className="kpi-card"+(bd.delayed>0?" clickable":"");
c.onclick=bd.delayed>0?(function(n){return function(){showDelayList(n);}})(NODES[i]):null;
}
var pl=document.getElementById("projectList");pl.innerHTML="";
var ov=0,wn=0,nm=0,dn=0;
f.forEach(function(p){if(p.slv==="red")ov++;else if(p.slv==="yellow")wn++;else if(p.slv==="gray")dn++;else nm++;});
var sb=document.createElement("div");sb.className="summary-bar";
sb.innerHTML="共 <b>"+f.length+"</b> 个项目"+(ov>0?"，<b style=color:#E53935>超期 "+ov+"</b> 个":"")+(wn>0?"，<b style=color:#F57C00>即将到期 "+wn+"</b> 个":"")+(nm>0?"，<b style=color:#43A047>正常 "+nm+"</b> 个":"")+(dn>0?"，<b style=color:#9E9E9E>完成 "+dn+"</b> 个":"")+(stage?" | "+stage:"");
pl.appendChild(sb);
var grps={red:{l:"超期",c:"red"},yellow:{l:"即将到期",c:"yellow"},green:{l:"正常",c:"green"},gray:{l:"完成",c:"gray"}};
for(var gk in grps){
var g=grps[gk],items=f.filter(function(p){return p.slv===gk;});if(!items.length)continue;
var hd=document.createElement("div");hd.className="group-header "+g.c;hd.textContent=g.l+" ("+items.length+")";pl.appendChild(hd);
items.forEach(function(p){
var it=document.createElement("div");it.className="project-item";if(sel===p.name)it.classList.add("selected");
it.innerHTML="<div class=item-info><div class=item-name>"+p.name+"</div><div class=item-meta>"+(p.person||"-")+" | "+(p.series||"-")+" | "+(p.cs||"-")+"</div></div><span class=badge badge-"+p.slv+">"+p.sl+"</span>";
it.onclick=function(){sel=p.name;render();showDetail(p);};pl.appendChild(it);
});
}
}
function showDetail(p){
var panel=document.getElementById("detailPanel");
var h="<h2 style=margin-bottom:12px>"+p.name+"</h2>";
h+="<p style=font-size:13px;color:#616161;margin-bottom:8px>负责人: "+(p.person||"-")+" | 系列: "+(p.series||"-")+" | 型号: "+(p.model||"-")+"</p>";
h+="<table style=width:100%;font-size:12px;border-collapse:collapse><tr style=background:#E3F2FD><th style=padding:6px 8px;text-align:left>节点</th><th style=padding:6px 8px;text-align:left>计划</th><th style=padding:6px 8px;text-align:left>状态</th></tr>";
["送检开始","送检结束","中试开始","中试结束","上市"].forEach(function(n){
var v=p.dates[n+"计划"]||"-";var m=p.mon[n]||"";var ic=m.includes("逾期")?"red":m.includes("按期")?"green":"";
h+="<tr><td style=padding:6px 8px><b>"+n+"</b></td><td style=padding:6px 8px>"+v+"</td><td style=padding:6px 8px;color:"+ic+">"+(m||"-")+"</td></tr>";
});
h+="</table>";panel.innerHTML=h;
}
function showDelayList(node){
var t=new Date().toISOString().split("T")[0];
var fl=all.filter(function(p){var plan=p.dates[NP[node]];var actual=p.dates[NA[node]];if(actual)return false;if(!plan)return p.mon[node]==="逾期未完成";return DB(plan,t)>0;});
var pl=document.getElementById("projectList");
pl.innerHTML="<div class=summary-bar>"+node+" 逾期未完成 ("+fl.length+") <button onclick=render() style=float:right>返回</button></div>";
fl.forEach(function(p){var it=document.createElement("div");it.className="project-item";
it.innerHTML="<div class=item-info><div class=item-name>"+p.name+"</div><div class=item-meta>"+(p.person||"-")+" | "+(p.series||"-")+"</div></div><span class=badge badge-red>超期</span>";
pl.appendChild(it);});
}
</script>
</body>
</html>
