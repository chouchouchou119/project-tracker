<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>产品项目进度提醒</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;background:#E3F2FD;color:#212121;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#fff;border-bottom:2px solid #BBDEFB;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.06)}
#header h1{font-size:20px;color:#1565C0;font-weight:700}
.header-info{font-size:12px;color:#9E9E9E}
.btn{padding:6px 14px;border-radius:6px;border:1px solid #BBDEFB;cursor:pointer;font-size:12px;font-family:inherit;background:#fff;color:#1565C0;font-weight:500;transition:all .15s}
.btn:hover{background:#E3F2FD;border-color:#1565C0}
.btn.active{background:#1565C0;color:#fff;border-color:#1565C0}
#kpiSection{display:flex;gap:14px;padding:18px 24px;flex-shrink:0}
.kpi-card{flex:1;background:#fff;border-radius:10px;padding:16px 14px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center;border-top:4px solid #BBDEFB;transition:all .2s}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.kpi-main{border-top-color:#1565C0;background:linear-gradient(180deg,#E8F0FE 0%,#fff 100%)}
.kpi-label{font-size:12px;color:#757575;margin-bottom:6px;font-weight:500}
.kpi-value{font-size:32px;font-weight:700;color:#212121}
.kpi-main .kpi-value{color:#1565C0}
.kpi-sub{font-size:11px;color:#9E9E9E;margin-top:4px}
.kpi-card.clickable{cursor:pointer}
.kpi-card.clickable:hover{border-top-color:#E53935}
#mainContent{display:flex;flex:1;overflow:hidden;gap:1px;background:#E0E0E0}
#leftPanel{width:58%;display:flex;flex-direction:column;background:#fff}
#rightPanel{flex:1;background:#fff;overflow-y:auto}
.detail-panel{padding:20px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#BDBDBD;font-size:14px;gap:8px}
.search-box{padding:12px 16px;border-bottom:1px solid #F0F0F0;flex-shrink:0}
.search-box input{width:100%;padding:9px 14px;border:1px solid #E0E0E0;border-radius:24px;font-size:13px;outline:none;background:#F5F5F5;transition:all .2s}
.search-box input:focus{background:#fff;border-color:#90CAF9;box-shadow:0 0 0 3px rgba(144,202,249,.2)}
#projectList{flex:1;overflow-y:auto}
#projectList::-webkit-scrollbar{width:6px}
#projectList::-webkit-scrollbar-thumb{background:#E0E0E0;border-radius:3px}
.group-header{padding:8px 16px;font-size:12px;font-weight:600;color:#757575;background:#FAFAFA;position:sticky;top:0;z-index:1;border-bottom:1px solid #F0F0F0}
.group-header.red{background:#FFF5F5;color:#E53935;border-left:4px solid #E53935}
.group-header.yellow{background:#FFFDE7;color:#F9A825;border-left:4px solid #F9A825}
.group-header.green{background:#F1F8E9;color:#43A047;border-left:4px solid #43A047}
.group-header.gray{background:#FAFAFA;color:#BDBDBD;border-left:4px solid #E0E0E0}
.project-item{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid #F5F5F5;cursor:pointer;border-left:4px solid transparent;gap:12px;transition:background .1s}
.project-item:hover{background:#F5F9FF}
.project-item.selected{background:#E3F2FD;border-left-color:#1565C0}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:11px;color:#9E9E9E;margin-top:3px;display:flex;gap:10px}
.badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600;white-space:nowrap}
.badge-red{background:#FFEBEE;color:#E53935}
.badge-yellow{background:#FFF8E1;color:#F57F17}
.badge-green{background:#E8F5E9;color:#2E7D32}
.badge-gray{background:#F5F5F5;color:#BDBDBD}
.login-box{display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#E3F2FD 0%,#BBDEFB 100%)}
.login-card{background:#fff;padding:48px 40px;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.1);text-align:center}
.login-card h2{color:#1565C0;margin-bottom:8px;font-size:22px}
.login-card p.sub{color:#9E9E9E;font-size:13px;margin-bottom:20px}
.login-card input{padding:12px 18px;border:2px solid #E0E0E0;border-radius:10px;font-size:16px;width:220px;text-align:center;outline:none;transition:border .2s}
.login-card input:focus{border-color:#1565C0}
.login-card button{margin-top:14px;padding:11px 40px;background:#1565C0;color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer;font-weight:600;transition:background .2s}
.login-card button:hover{background:#0D47A1}
.summary-bar{padding:10px 16px;font-size:12px;background:#F5F5F5;border-bottom:1px solid #E0E0E0;color:#616161}
.filter-bar{padding:8px 16px;border-bottom:1px solid #F0F0F0;display:flex;gap:6px;flex-wrap:wrap}
.stage-chip{padding:4px 12px;border:1px solid #BBDEFB;border-radius:14px;font-size:11px;cursor:pointer;background:#fff;color:#1565C0;font-weight:500;transition:all .15s}
.stage-chip:hover{background:#E3F2FD}
.stage-chip.active{background:#1565C0;color:#fff;border-color:#1565C0;font-weight:600}
.pilot-card{background:#fff;border:1px solid #E0E0E0;border-radius:8px;padding:14px;margin-bottom:8px;transition:box-shadow .15s}
.pilot-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.chase-box{background:#FFF8E1;border:1px solid #FFE082;border-radius:6px;padding:10px;margin-top:8px;font-size:11px;color:#E65100}
table.detail{width:100%;font-size:12px;border-collapse:collapse}
table.detail th{background:#F5F5F5;padding:8px 10px;text-align:left;font-weight:600;color:#616161;border-bottom:2px solid #E0E0E0}
table.detail td{padding:8px 10px;border-bottom:1px solid #F0F0F0}
table.detail tr:hover{background:#FAFAFA}
.detail-section{margin-bottom:20px}
.detail-section h3{font-size:13px;color:#616161;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #F0F0F0;font-weight:600}
</style>
</head>
<body>

<div id="loginPage" class="login-box"><div class="login-card">
<h2>产品项目进度提醒</h2>
<p class="sub">请输入访问密码</p>
<input type="password" id="pw" placeholder="输入密码" autofocus><br>
<p id="err" style="color:#E53935;margin-top:8px;display:none;font-size:13px">密码错误，请重试</p>
<button onclick="login()">确认</button>
</div></div>

<div id="mainApp" style="display:none;height:100vh;flex-direction:column">
<header id="header">
<h1>产品项目进度提醒</h1>
<div style="display:flex;align-items:center;gap:12px">
<span class="header-info">密码: 119119</span>
<button class="btn" onclick="showPilotOverview()" id="btnPilot">中试概览</button>
</div>
</header>

<section id="kpiSection">
<div class="kpi-card kpi-main" id="kpiMain">
<div class="kpi-label">按时完成率</div>
<div class="kpi-value">--</div>
<div class="kpi-sub">加载中...</div>
</div>
<div class="kpi-card" id="kpi0"><div class="kpi-label">送检开始</div><div class="kpi-value">--</div><div class="kpi-sub"></div></div>
<div class="kpi-card" id="kpi1"><div class="kpi-label">送检结束</div><div class="kpi-value">--</div><div class="kpi-sub"></div></div>
<div class="kpi-card" id="kpi2"><div class="kpi-label">中试开始</div><div class="kpi-value">--</div><div class="kpi-sub"></div></div>
</section>

<main id="mainContent">
<aside id="leftPanel">
<div class="search-box"><input type="text" id="searchInput" placeholder="搜索项目名称、系列、负责人..." oninput="render()">
<div class="filter-bar" id="stageBtns">
<span class="stage-chip active" data-s="全部" onclick="setStage(this)">全部</span>
<span class="stage-chip" data-s="送检开始" onclick="setStage(this)">送检开始</span>
<span class="stage-chip" data-s="送检结束" onclick="setStage(this)">送检结束</span>
<span class="stage-chip" data-s="中试开始" onclick="setStage(this)">中试开始</span>
<span class="stage-chip" data-s="中试结束" onclick="setStage(this)">中试结束</span>
<span class="stage-chip" data-s="上市" onclick="setStage(this)">上市</span>
</div></div>
<div id="projectList"><div class="empty-state"><p>加载中...</p></div></div>
</aside>
<section id="rightPanel"><div id="detailPanel" class="detail-panel"><div class="empty-state"><p>点击左侧项目查看详情</p></div></div></section>
</main>
</div>

<script src="xlsx.min.js"></script>
<script>
var all=[],kpi=null,search="",stage="",sel=null,PWD="119119",pilotAspect="";

// ============ 登录 ============
function login(){
var v=document.getElementById("pw").value;
if(v===PWD){document.getElementById("loginPage").style.display="none";document.getElementById("mainApp").style.display="flex";document.cookie="key="+PWD+";max-age=86400;path=/";load();}
else{document.getElementById("err").style.display="block";}
}
if(document.cookie.indexOf("key="+PWD)>=0){document.getElementById("loginPage").style.display="none";document.getElementById("mainApp").style.display="flex";load();}

// ============ 阶段筛选 ============
function setStage(el){
var btns=document.querySelectorAll(".stage-chip");
for(var i=0;i<btns.length;i++)btns[i].classList.remove("active");
el.classList.add("active");stage=el.getAttribute("data-s");
if(stage==="全部")stage="";render();
}

// ============ 数据加载 ============
function load(){
var x=new XMLHttpRequest();x.open("GET","data.xlsx",true);x.responseType="arraybuffer";
x.onload=function(){
if(x.status!==200){document.getElementById("projectList").innerHTML="<div class=empty-state><p>文件加载失败</p></div>";return;}
try{var wb=XLSX.read(new Uint8Array(x.response),{type:"array"});var s1=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:""});var s2=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[1]],{header:1,defval:""});parseData(s1,s2);}
catch(e){document.getElementById("projectList").innerHTML="<div class=empty-state><p>解析错误: "+e.message+"</p></div>";}
};
x.onerror=function(){document.getElementById("projectList").innerHTML="<div class=empty-state><p>网络错误</p></div>";};
x.send();
}

// ============ 工具函数 ============
function C(v){return v?String(v).replace(/\r?\n/g," ").trim():"";}
function DT(s){if(!s||s<1)return"";try{var p=XLSX.SSF.parse_date_code(s);return p.y+"-"+String(p.m).padStart(2,"0")+"-"+String(p.d).padStart(2,"0");}catch(e){return"";}}
function DB(d1,d2){if(!d1||!d2)return Infinity;var a=new Date(d1),b=new Date(d2);if(isNaN(a)||isNaN(b))return Infinity;return Math.round((b-a)/86400000);}
function CV(a){for(var r=0;r<a.length;r++)for(var c=0;c<a[r].length;c++)if(typeof a[r][c]==="number"&&a[r][c]>40000&&a[r][c]<100000){var ds=DT(a[r][c]);if(ds)a[r][c]=ds;}}

// ============ 解析Sheet2 ============
function parsePilot(s2){var pm={};if(s2&&s2.length>1)for(var r=1;r<s2.length;r++){var n=C(s2[r][0]);if(n)pm[n]={arc:C(s2[r][10]||""),mat:C(s2[r][11]||""),prod:C(s2[r][14]||""),rev:s2[r][16]||"",conc:C(s2[r][17]||"")};}return pm;}

// ============ 解析Sheet1 (exact match with desktop excelParser.js) ============
function parseData(s1,s2){
CV(s1);CV(s2);var pm=parsePilot(s2);all=[];
for(var r=1;r<s1.length;r++){
var name=C(s1[r][4]);if(!name)continue;
var p={
name:name,sn:C(s1[r][0]),series:C(s1[r][1]),model:C(s1[r][5]),
altCode:C(s1[r][7]),altModel:C(s1[r][8]),
person:C(s1[r][36]),ps:C(s1[r][32]),cs:C(s1[r][38]),nn:C(s1[r][39]||""),
dates:{
"送检开始计划":s1[r][9]||"","送检结束计划":s1[r][10]||"","中试开始计划":s1[r][11]||"","中试结束计划":s1[r][12]||"","批产开始计划":s1[r][13]||"","批产结束计划":s1[r][14]||"","上市计划":s1[r][15]||"",
"送检开始实际":s1[r][16]||"","送检结束实际":s1[r][17]||"","中试开始实际":s1[r][18]||"","中试结束实际":s1[r][19]||"","批产开始实际":s1[r][20]||"","批产结束实际":s1[r][21]||"","上市实际":s1[r][22]||"","获证实际":s1[r][23]||""
},
mon:{"送检开始":C(s1[r][24]),"送检结束":C(s1[r][25]),"中试开始":C(s1[r][26]),"中试结束":C(s1[r][27]),"批产开始":C(s1[r][28]),"批产结束":C(s1[r][29])}
};
p.lpcb=name.toUpperCase().includes("LPCB");
p.coop=(s1[r][33]===0||s1[r][33]==="0");
p.pilot=pm[name]||null;
all.push(p);
}
render();
}

// ============ KPI计算 (exact match with desktop kpiCalculator.js) ============
var NODES=["送检开始","送检结束","中试开始"];
var NP={"送检开始":"送检开始计划","送检结束":"送检结束计划","中试开始":"中试开始计划"};
var NA={"送检开始":"送检开始实际","送检结束":"送检结束实际","中试开始":"中试开始实际"};
var STAGE_P={"送检开始":"送检开始计划","送检结束":"送检结束计划","中试开始":"中试开始计划","中试结束":"中试结束计划","上市":"上市计划"};
var STAGE_A={"送检开始":"送检开始实际","送检结束":"送检结束实际","中试开始":"中试开始实际","中试结束":"中试结束实际","上市":"上市实际"};

function isNodeDelayed(p,node,today){
var plan=p.dates[NP[node]],actual=p.dates[NA[node]];
if(actual)return false;
if(!plan){var ms=p.mon[node]||"";return ms==="逾期未完成";}
var past=DB(plan,today);
if(past===Infinity){var ms2=p.mon[node]||"";return ms2==="逾期未完成";}
return past>0;
}

function calcKPI(projs,today){
if(!today){var now=new Date();today=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");}
var m=projs.filter(function(p){
if(p.ps==="完成"||p.ps==="提前完成")return false;if(p.lpcb)return false;if(p.coop)return false;
var dp=DB(today,p.dates["送检开始计划"]);return(dp>=0&&dp<=30)||!!p.dates["送检开始实际"];
});
var d=0,bd={};for(var i=0;i<NODES.length;i++)bd[NODES[i]]={delayed:0};
for(var j=0;j<m.length;j++){var dl=false;
for(var k=0;k<NODES.length;k++){if(isNodeDelayed(m[j],NODES[k],today)){bd[NODES[k]].delayed++;dl=true;}}
if(dl)d++;
}
var rate=m.length>0?(1-d/m.length):0;
return{rate:Math.round(rate*10000)/100,disp:(Math.round(rate*1000)/10).toFixed(1)+"%",dc:d,tc:m.length,bd:bd};
}

// ============ 排序 (exact match with desktop sorter.js) ============
function sortProjects(projs){
var today=new Date().toISOString().split("T")[0];
var planKey=STAGE_P[stage]||null,actualKey=STAGE_A[stage]||null;
projs.forEach(function(p){
var urgency;
if(planKey&&p.dates[planKey]){
if(actualKey&&p.dates[actualKey]){urgency={days:Infinity,label:"已完成"};}
else{var d2=DB(today,p.dates[planKey]);if(d2<0)urgency={days:d2,label:"超期"+Math.abs(d2)+"天"};else if(d2>0)urgency={days:d2,label:"还有"+d2+"天"};else urgency={days:Infinity,label:"今天"};}
}else{
var tx=p.nn;var m=tx.match(/已超期(\d+)天/);
if(m)urgency={days:-parseInt(m[1]),label:"超期"+m[1]+"天"};
else{m=tx.match(/还有(\d+)天/);if(m)urgency={days:parseInt(m[1]),label:"还有"+m[1]+"天"};else urgency={days:Infinity,label:tx.includes("已完成")?"已完成":""};}
}
p.sd=urgency.days;p.sl=urgency.label;
if(urgency.days===Infinity)p.slv="normal";
else if(urgency.days<-30)p.slv="red";else if(urgency.days<0)p.slv="red";
else if(urgency.days<=7)p.slv="yellow";else if(urgency.days<=30)p.slv="yellow";else p.slv="green";
if(p.ps==="完成"||p.ps==="提前完成"){p.sd=Infinity;p.sl=p.ps;p.slv="gray";}
});
projs.sort(function(a,b){return a.sd-b.sd||a.name.localeCompare(b.name,"zh-CN");});
}

// ============ 渲染 ============
function render(){
sortProjects(all);kpi=calcKPI(all);
var f=all.slice();
if(search){var kw=search.toLowerCase();f=f.filter(function(p){return p.name.toLowerCase().includes(kw)||p.series.toLowerCase().includes(kw)||p.person.toLowerCase().includes(kw);});}
if(stage){var sm={送检开始:"送检",送检结束:"送检",中试开始:"中试",中试结束:"中试",上市:"上市"};var sk=sm[stage]||stage;f=f.filter(function(p){return(p.cs&&p.cs.includes(sk))||(stage==="上市"&&p.dates["上市计划"]);});}

// KPI 卡片
document.getElementById("kpiMain").querySelector(".kpi-value").textContent=kpi.disp;
document.getElementById("kpiMain").querySelector(".kpi-sub").textContent="延期 "+kpi.dc+" / 监控 "+kpi.tc;
var re=document.getElementById("kpiMain").querySelector(".kpi-value");
re.style.color=kpi.rate>=90?"#43A047":(kpi.rate>=75?"#F57C00":"#E53935");
for(var i=0;i<3;i++){
var c=document.getElementById("kpi"+i),bd=kpi.bd[NODES[i]];
c.querySelector(".kpi-value").textContent=bd.delayed>0?bd.delayed+" 逾期":"正常";
c.querySelector(".kpi-value").style.color=bd.delayed>0?"#E53935":"#43A047";
c.querySelector(".kpi-sub").textContent=bd.delayed>0?"点击查看明细":"";
c.className="kpi-card"+(bd.delayed>0?" clickable":"");
c.onclick=bd.delayed>0?(function(n){return function(){showDelayList(n);}})(NODES[i]):null;
}

// 项目列表
var pl=document.getElementById("projectList");pl.innerHTML="";
var ov=0,wn=0,nm=0,dn=0;
f.forEach(function(p){if(p.slv==="red")ov++;else if(p.slv==="yellow")wn++;else if(p.slv==="gray")dn++;else nm++;});
var sb=document.createElement("div");sb.className="summary-bar";
sb.innerHTML="共 <b>"+f.length+"</b> 个项目"+(ov>0?"，<b style=color:#E53935>超期 "+ov+" 个</b>":"")+(wn>0?"，<b style=color:#F57C00>即将到期 "+wn+" 个</b>":"")+(nm>0?"，<b style=color:#43A047>正常 "+nm+" 个</b>":"")+(dn>0?"，<b style=color:#BDBDBD>完成 "+dn+" 个</b>":"")+(stage?" | "+stage:"");
pl.appendChild(sb);

var grps={red:{l:"超期",c:"red"},yellow:{l:"即将到期",c:"yellow"},green:{l:"正常",c:"green"},gray:{l:"完成",c:"gray"}};
for(var gk in grps){var g=grps[gk],items=f.filter(function(p){return p.slv===gk;});if(!items.length)continue;
var hd=document.createElement("div");hd.className="group-header "+g.c;hd.textContent=g.l+" ("+items.length+")";pl.appendChild(hd);
items.forEach(function(p){
var it=document.createElement("div");it.className="project-item";if(sel===p.name)it.classList.add("selected");
it.innerHTML="<div class=item-info><div class=item-name>"+(p.pilot?"🔧 ":"")+p.name+"</div><div class=item-meta><span>👤 "+(p.person||"-")+"</span><span>📦 "+(p.series||"-")+"</span><span>"+(p.model||"-")+"</span><span>📍 "+(p.cs||"-")+"</span></div></div><span class=badge badge-"+p.slv+">"+p.sl+"</span>";
it.onclick=function(){sel=p.name;render();showDetail(p);};pl.appendChild(it);
});}
}

// ============ 项目详情 ============
function showDetail(p){
var panel=document.getElementById("detailPanel");
var h="<div style=display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #BBDEFB><h2 style=font-size:17px;color:#1565C0>"+p.name+"</h2><span style=font-size:12px;padding:4px 10px;border-radius:12px;background:"+(p.ps==="完成"||p.ps==="提前完成"?"#E8F5E9":"#FFF3E0")+";color:"+(p.ps==="完成"||p.ps==="提前完成"?"#2E7D32":"#F57C00")+">"+(p.ps||"进行中")+"</span></div>";

h+="<div class=detail-section><h3>基本信息</h3>";
h+="<div style=display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;font-size:13px>";
h+="<div><span style=color:#9E9E9E>序号</span> "+(p.sn||"-")+"</div>";
h+="<div><span style=color:#9E9E9E>系列</span> "+(p.series||"-")+"</div>";
h+="<div><span style=color:#9E9E9E>型号</span> "+(p.model||"-")+"</div>";
h+="<div><span style=color:#9E9E9E>替代型号</span> "+(p.altModel||"-")+"</div>";
h+="<div><span style=color:#9E9E9E>替代编码</span> "+(p.altCode||"-")+"</div>";
h+="<div><span style=color:#9E9E9E>负责人</span> <b>"+(p.person||"-")+"</b></div>";
h+="<div><span style=color:#9E9E9E>当前阶段</span> "+(p.cs||"-")+"</div>";
h+="<div><span style=color:#9E9E9E>下一步</span> <span style=color:"+(p.nn.indexOf("超期")>=0?"#E53935":"#616161")+">"+(p.nn||"-")+"</span></div>";
h+="</div></div>";

h+="<div class=detail-section><h3>关键节点进度</h3>";
h+="<div style=display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap>";
var nds=[["送检开始","送检开始计划","送检开始实际"],["送检结束","送检结束计划","送检结束实际"],["中试开始","中试开始计划","中试开始实际"],["中试结束","中试结束计划","中试结束实际"],["批产开始","批产开始计划","批产开始实际"],["批产结束","批产结束计划","批产结束实际"],["上市","上市计划","上市实际"]];
nds.forEach(function(n){
var st=p.mon[n[0]]||"";var cls="background:#F5F5F5;color:#BDBDBD";
if(st.includes("逾期未完成"))cls="background:#FFEBEE;color:#E53935;font-weight:600";
else if(st.includes("逾期完成"))cls="background:#FFF3E0;color:#EF6C00";
else if(st.includes("按期完成"))cls="background:#E8F5E9;color:#2E7D32";
else if(st==="待完成")cls="background:#FFF8E1;color:#F57F17";
h+="<div style=flex:1;min-width:90px;text-align:center;padding:10px 6px;border-radius:8px;font-size:11px;"+cls+"><div style=font-weight:600;margin-bottom:2px>"+n[0]+"</div><div style=font-size:10px;color:#9E9E9E>计划 "+(p.dates[n[1]]||"-")+"</div><div style=font-size:10px;color:#9E9E9E>实际 "+(p.dates[n[2]]||"-")+"</div><div style=margin-top:4px>"+st+"</div></div>";
});
h+="</div></div>";

if(p.pilot){var d=p.pilot;
h+="<div class=detail-section><h3>中试进度</h3>";
h+="<div style=display:flex;gap:8px;flex-wrap:wrap;font-size:12px>";
h+="<div style=flex:1;min-width:80px;text-align:center;padding:10px 8px;border-radius:8px;background:"+(d.arc==="是"?"#E8F5E9":"#FFEBEE")+";color:"+(d.arc==="是"?"#2E7D32":"#E53935")+"><div>① 归档</div><div style=font-size:18px;margin-top:4px>"+(d.arc==="是"?"✅":"❌")+"</div></div>";
h+="<div style=flex:1;min-width:80px;text-align:center;padding:10px 8px;border-radius:8px;background:"+(d.mat==="是"?"#E8F5E9":"#FFEBEE")+";color:"+(d.mat==="是"?"#2E7D32":"#E53935")+"><div>② 物料</div><div style=font-size:18px;margin-top:4px>"+(d.mat==="是"?"✅":"❌")+"</div></div>";
h+="<div style=flex:1;min-width:80px;text-align:center;padding:10px 8px;border-radius:8px;background:"+(d.prod==="是"?"#E8F5E9":"#FFEBEE")+";color:"+(d.prod==="是"?"#2E7D32":"#E53935")+"><div>③ 生产</div><div style=font-size:18px;margin-top:4px>"+(d.prod==="是"?"✅":"❌")+"</div></div>";
h+="<div style=flex:1;min-width:80px;text-align:center;padding:10px 8px;border-radius:8px;background:"+(d.rev?"#E8F5E9":"#FFF8E1")+";color:"+(d.rev?"#2E7D32":"#F57F17")+"><div>④ 评审</div><div style=font-size:18px;margin-top:4px>"+(d.rev||"⏳")+"</div></div>";
h+="<div style=flex:1;min-width:80px;text-align:center;padding:10px 8px;border-radius:8px;background:"+(d.conc?"#E8F5E9":"#FFF8E1")+";color:"+(d.conc?"#2E7D32":"#F57F17")+"><div>⑤ 结论</div><div style=font-size:18px;margin-top:4px>"+(d.conc||"⏳")+"</div></div>";
h+="</div></div>";
}
panel.innerHTML=h;
}

// ============ 中试概览 ============
function showPilotOverview(){
var pp=all.filter(function(p){return p.pilot;});
var panel=document.getElementById("detailPanel");
if(!pp.length){panel.innerHTML="<div class=empty-state><p>无中试项目</p></div>";return;}
var aspects=[{k:"",l:"全部"},{k:"archive",l:"归档"},{k:"material",l:"物料"},{k:"production",l:"生产"},{k:"review",l:"评审"}];
var h="<div style=padding:20px><h2 style=margin-bottom:12px;color:#1565C0>中试进度概览</h2>";
h+="<div style=margin-bottom:14px;display:flex;gap:6px;flex-wrap:wrap>";
aspects.forEach(function(a){h+="<span class=stage-chip"+(pilotAspect===a.k?" active":"")+" style=cursor:pointer onclick=\"pilotAspect='"+a.k+"';showPilotOverview()\">"+a.l+"</span>";});
h+="</div>";
var fl=pp.slice();
if(pilotAspect==="archive")fl=fl.filter(function(p){return p.pilot.arc!=="是";});
else if(pilotAspect==="material")fl=fl.filter(function(p){return p.pilot.mat!=="是";});
else if(pilotAspect==="production")fl=fl.filter(function(p){return p.pilot.prod!=="是";});
else if(pilotAspect==="review")fl=fl.filter(function(p){return!p.pilot.rev;});
h+="<div class=summary-bar>共 <b>"+fl.length+"</b> 个项目</div>";
fl.forEach(function(p){var d=p.pilot;
var chase=[];if(d.arc!=="是")chase.push("归档→薛涵月");if(d.mat!=="是")chase.push("物料→生产计划");if(d.prod!=="是")chase.push("生产→孙登琨");if(!d.rev)chase.push("评审→姜雨豪");
h+="<div class=pilot-card><div style=display:flex;justify-content:space-between;align-items:center><strong>"+p.name+"</strong><span style=font-size:11px;background:"+(chase.length?"#FFEBEE":"#E8F5E9")+";color:"+(chase.length?"#E53935":"#2E7D32")+";padding:2px 8px;border-radius:10px>"+(chase.length?chase.length+"项待催":"正常")+"</span></div>";
h+="<div style=font-size:11px;color:#9E9E9E;margin-top:2px>👤 "+(p.person||"-")+" | 📦 "+(p.series||"-")+" | 型号: "+(p.model||"-")+"</div>";
if(chase.length)h+="<div class=chase-box>"+chase.map(function(c){return"• "+c;}).join("<br>")+"</div>";
h+="<div style=font-size:11px;color:#757575;margin-top:6px;display:flex;gap:12px>归档:"+(d.arc==="是"?"✅":"❌")+" 物料:"+(d.mat==="是"?"✅":"❌")+" 生产:"+(d.prod==="是"?"✅":"❌")+" 评审:"+(d.rev||"⏳")+" 结论:"+(d.conc||"⏳")+"</div></div>";
});
h+="</div>";panel.innerHTML=h;
}

// ============ 逾期筛选 ============
function showDelayList(node){
var t=new Date().toISOString().split("T")[0];
var fl=all.filter(function(p){return isNodeDelayed(p,node,t);});
var pl=document.getElementById("projectList");
pl.innerHTML="<div class=summary-bar style=background:#FFEBEE>"+node+" 逾期未完成（"+fl.length+"个项目）<button onclick=render() style=float:right;border:1px solid #ccc;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:11px>← 返回</button></div>";
fl.forEach(function(p){
var planDate=p.dates[NP[node]]||"-";
var status=p.mon[node]||"-";
var d=DB(planDate==="-"?null:planDate,t);
var daysInfo=d>0?"超期"+Math.abs(d)+"天":"";
var it=document.createElement("div");it.className="project-item";
it.innerHTML="<div class=item-info><div class=item-name>"+p.name+" <span style=font-size:11px;color:#9E9E9E>"+(p.model||"")+"</span></div><div class=item-meta>👤 "+(p.person||"-")+" | 计划: "+planDate+" | "+status+" | "+daysInfo+"</div></div><span class=badge badge-red>超期</span>";
it.onclick=function(){sel=p.name;render();showDetail(p);};pl.appendChild(it);
});}
</script>
